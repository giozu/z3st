# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---
# Z3ST: An open-source FEniCSx framework for thermo-mechanical analysis
# Author: Giovanni Zullo
# Version: 0.2.0 (2026)
# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---

name: z3st
channels:
- conda-forge
- defaults

dependencies:
  # --. Python --..
- python=3.12
- pip

  # --. FEniCSx --..
- fenics-dolfinx=0.11.0    # includes ufl, basix, petsc, slepc, mpi4py; Z3ST targets 0.11.0 (matches CI image dolfinx/dolfinx:v0.11.0)

  # --. Scientific stack --..
- numpy
- scipy
- sympy
- pandas
- matplotlib
- pyvista
- meshio

  # --. Jupyter / visualization --..
- jupyterlab
- ipywidgets
- pyqt

  # --. YAML / config --..
- pyyaml

  # --. (Optional) for debugging or development --..
  # - tqdm
  # - rich
  # - ipython

  # --. (Optional) for developers --..
  # - black            # code formatter
  # - flake8           # linting
  # - pytest           # testing framework
  # - pytest-cov       # coverage reports
  # - pre-commit       # git hook management

  # --. (Optional) neural-network --..
  # After creating the env, run:
  #   pip install --index-url https://download.pytorch.org/whl/cpu torch   # CPU build is enough
  #   pip install --no-deps "git+https://github.com/a-latyshev/dolfinx-external-operator.git@cf5255e0b0ed21f350f931d4d0755181a3126456"
  # Note: torch needs setuptools<82 while fenics-ffcx needs >=77.0.3; pin 81 if pip drifts:
  #   pip install "setuptools>=77.0.3,<82"

  # --. Install via pip (not conda!) --..
- pip:
  - gmsh
  - sphinx
  - sphinx-book-theme
  - myst-parser
  - sphinx-autodoc-typehints
