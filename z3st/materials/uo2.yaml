name: UO2

E: 358.0e9          # (Pa) - Young's modulus
nu: 0.23            # (-)  - Poisson's ratio

k: 5.0              # (W/(m·K)) - Thermal conductivity
cp: 280.0           # (J/(kg·K)) - Specific heat capacity
rho: 10970.0        # (kg/m³) - Density

alpha: 1.0e-5       # (1/K)

sigma_c: 2.0e+9     # (Pa) - phase-field tensile strength threshold; Gc auto-derived in spine.py
                    #         from sigma_c, lc, E (AT1: Gc = (8/3)*lc*sigma_c^2/E).
                    #         Calibration choice: McClenny's macrocrack-fit Gc = 80 MPa·mm gives
                    #         sigma_c ≈ 14.7 GPa at lc = 50 um (no damage initiates); 1 GPa caused
                    #         the Amor-split deviatoric psi+ in compression to cross the threshold
                    #         too. 2 GPa gives Gc ≈ 1490 J/m^2, threshold psi_c ≈ 5.6 MJ/m^3 --
                    #         crossed only at the cold rim's tensile-hoop-stress region.
# Gc: 80000.0       # (J/m^2) - McClenny et al. JNM 565 (2022) 153719, Table 3 (80 MPa-mm).
                    #            Disabled in favor of sigma_c above; spine.py would prefer
                    #            sigma_c anyway (see spine.py:131).

T_ref: 298.15       # (K)
T_initial: 1023.15  # (K) = 750°C, pellet uniformly hot before quench
