mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  solid: ../../materials/oxide.yaml

solver_settings:
  coupling: staggered
  max_iters: 100
  relax_T: 0.9
  relax_u: 0.7
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.7
  relax_min: 0.05
  relax_max: 1.0

models:
  thermal: false
  mechanical: true
  damage: true

mechanical:
  solver: linear
  linear_solver: iterative_amg # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  mechanical_regime: 2D
  convergence: rel_norm # rel_norm | norm
  debug: false

thermal:
  solver: linear
  linear_solver: iterative_amg # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm

damage:
  type: AT2
  solver: linear
  linear_solver: iterative_hypre # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm
  lc: 0.004

lhr:
- 0.0
- 0.0
time:
- 0.0
- 3600.0
n_steps: 5
