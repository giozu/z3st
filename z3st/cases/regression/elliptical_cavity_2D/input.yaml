mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  solid: ../../../materials/oxide.yaml

regime: 2D

solver_settings:
  coupling: staggered
  max_iters: 100
  relax_T: 0.9
  relax_u: 0.7
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.7
  relax_min: 0.05
  relax_max: 1.0

models:
  thermal: false
  mechanical: true

mechanical:
  solver: linear
  order: 1
  linear_solver: iterative_hypre # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm
  debug: false

thermal:
  solver: linear
  linear_solver: iterative_hypre # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm

lhr:
- 0
time:
- 0
n_steps: 1
