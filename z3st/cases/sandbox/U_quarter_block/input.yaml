mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  volume: ../../materials/oxide.yaml

regime: 3D

solver_settings:
  coupling: staggered
  max_iters: 100
  relax_T: 0.9
  relax_u: 0.4

models:
  thermal: true
  mechanical: true
  damage: false

mechanical:
  solver: linear # linear | non-linear
  linear_solver: direct_mumps # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  
  convergence: rel_norm # rel_norm | norm
  debug: false

thermal:
  solver: linear # linear | non-linear
  linear_solver: direct_mumps # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm

lhr:
- 100.0 # (W/m)
time:
- 0.0
n_steps: 1
