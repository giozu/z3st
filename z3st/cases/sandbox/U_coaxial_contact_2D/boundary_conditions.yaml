thermal:
  cyl_1:
  - type: Neumann
    region: bottom_1
    flux: 0.0

  - type: Neumann
    region: top_1
    flux: 0.0

  - type: Neumann
    region: axis_1
    flux: 0.0

  - type: Robin
    region: lateral_1
    pair: inner_2

  cyl_2:
  - type: Neumann
    region: bottom_2
    flux: 0.0

  - type: Neumann
    region: top_2
    flux: 0.0

  - type: Robin
    region: inner_2
    pair: lateral_1

  - type: Dirichlet
    region: outer_2
    temperature: 580.0   # (K) coolant

mechanical:
  cyl_1:
  - type: Clamp_x
    region: axis_1        # u_r = 0 on symmetry axis

  - type: Clamp_y
    region: bottom_1      # u_z = 0 (symmetry plane)
  # lateral_1 (pellet outer): free until penalty contact engages

  cyl_2:
  - type: Clamp_y
    region: bottom_2      # u_z = 0

  - type: Neumann
    region: outer_2
    traction: -15.5e+6    # (Pa) coolant system pressure (inward)
  # inner_2 (clad inner): free until penalty contact engages
