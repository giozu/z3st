mechanical:
  steel:
  - type: Clamp_x
    region: xmax

  - type: Clamp_y
    region: ymin

  - type: Neumann
    region: ymax
    traction: [0.0, 1.0e8, 2.0e8, 3.0e8, 3.5e8, 3.7e8]   # (Pa)

thermal:
  steel:
  - type: Dirichlet
    region: xmax
    temperature: 300.0   # (K)

damage:
  steel:
  - type: Dirichlet
    region: crack
    temperature: 1.0   # (/)
