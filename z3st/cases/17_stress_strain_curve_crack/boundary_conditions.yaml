mechanical:
  steel:
  - type: Clamp_x
    region: xmax

  - type: Clamp_y
    region: ymin

  - type: Neumann
    region: ymax
    traction: [0.0, 5.0e7, 7.5e7, 1.0e8, 1.1e8, 1.2e8, 1.3e8, 1.4e8, 1.5e8, 1.6e8, 1.7e8, 1.8e8, 1.9e8, 2.0e8, 2.0e8] # (Pa)

thermal:
  steel:
  - type: Dirichlet
    region: xmax
    temperature: 300.0   # (K)

damage:
  steel:
  - type: Dirichlet
    region: crack
    value: 1.0   # (/)
