mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

solver_settings:
  coupling: staggered
  max_iters: 100

models:
  cluster: true

cluster:
  # initial_condition:
  #   type: gaussian
  #   mean: 10.0
  #   std_dev: 5.0
  #   amplitude: 1000.0
  initial_condition:
    type: constant
    region: left
    value: 1000
  conserve_mass: true

output:
  format: xdmf
  filename: results.xdmf

lhr: 
  - 0.0
time:
  - 0.0
n_steps: 1
