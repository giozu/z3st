mechanical:
  steel:
  - type: Clamp_x
    region: xmax

  - type: Clamp_y
    region: ymin

  - type: Neumann
    region: ymax
    traction: 2.0e8   # (Pa)

thermal:
  steel:
  - type: Dirichlet
    region: xmax
    temperature: 300.0   # (K)

damage:
  steel:
  - type: Dirichlet
    region: crack
    value: 1.0   # (/)
