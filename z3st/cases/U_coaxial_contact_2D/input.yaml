#
# 2D axisymmetric fuel-rod PCMI demo.
# A UO2 pellet (cyl_1) and Zircaloy cladding (cyl_2) are separated by an
# initial 30 um radial gap. As the linear heat rate ramps, the pellet heats,
# expands, closes the gap, and mechanically contacts the cladding. Contact is
# enforced by an explicit penalty (models.contact); heat crosses the gap via
# the Robin gap-conductance pair (thermal).

mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  cyl_1: fuel.yaml
  cyl_2: clad.yaml

regime: axisymmetric

solver_settings:
  coupling: staggered
  max_iters: 250
  relax_T: 0.9
  relax_u: 0.3
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.6
  relax_min: 0.03
  relax_max: 0.9

models:
  thermal: true
  mechanical: true
  gap_conductance:
    type: Fixed
    value: 5000.0    # W/m2-K (open-gap baseline)
    contact_coupling:           # Todreas-Kazimi Eq. 8.141/8.142
      enabled: true
      meyer_hardness: 9.65e8    # (Pa) Zircaloy Meyer hardness (~14e4 psi)
      gas_thickness: 4.0e-6     # (m) roughness-based gas space on contact
  contact:
    surface_a: lateral_1     # pellet outer
    surface_b: inner_2       # clad inner
    penalty_stiffness: 5.0e13  # (Pa/m)
    initial_gap: 30.0e-6       # (m)

mechanical:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-5
  stag_tol: 1.0e-4
  convergence: rel_norm

thermal:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-7
  stag_tol: 1.0e-6
  convergence: rel_norm
  analysis: stationary

lhr:
- 0.0
- 45000.0
time:
- 0.0
- 3600.0
n_steps: 13

