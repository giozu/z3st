thermal:
  cyl_1:
  - type: Neumann
    region: bottom_1
    flux: 0.0

  - type: Neumann
    region: top_1
    flux: 0.0

  - type: Neumann
    region: axis_1
    flux: 0.0

  - type: Robin
    region: lateral_1
    pair: inner_2

  cyl_2:
  - type: Neumann
    region: bottom_2
    flux: 0.0

  - type: Neumann
    region: top_2
    flux: 0.0

  - type: Robin
    region: inner_2
    pair: lateral_1

  - type: Dirichlet
    region: outer_2
    temperature: 580.0   # (K) coolant

# He fill-gas pressure. Scalar Neumann traction acts along the outward facet
# normal, so a pressure is always negative (compresses the surface). After
# gap closure the penalty contact traction is added on top of this.
mechanical:
  cyl_1:
  - type: Clamp_x
    region: axis_1        # u_r = 0 on symmetry axis

  - type: Clamp_y
    region: bottom_1      # u_z = 0 (symmetry plane)

  - type: Neumann
    region: lateral_1
    traction: -2.0e+6     # (Pa) fill-gas pressure on pellet outer

  - type: Neumann
    region: top_1
    traction: -2.0e+6     # (Pa) fill-gas pressure on pellet end face

  cyl_2:
  - type: Clamp_y
    region: bottom_2      # u_z = 0

  - type: Neumann
    region: outer_2
    traction: -15.5e+6    # (Pa) coolant system pressure (inward)

  - type: Neumann
    region: inner_2
    traction: -2.0e+6     # (Pa) fill-gas pressure on clad inner (pushes clad outward)
