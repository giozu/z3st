thermal:
  steel_in:
  - type: Dirichlet
    region: inner_radius
    temperature: 300.0   # (K)

mechanical:
  steel_o:

    - type: Neumann
      region: outer_radius
      traction: -1.0e+6   # (Pa)   Pressure on the external boundary

    - type: Clamp_y
      region: bottom_o

    - type: Clamp_y
      region: top_o

  gap_region:
    - type: Clamp_y
      region: bottom_gap

    - type: Clamp_y
      region: top_gap

  steel_in:


    - type: Clamp_x
      region: inner_radius
      value: 0.0

    - type: Clamp_y
      region: bottom_in

    - type: Clamp_y
      region: top_in