thermal:
  steel_in:
  - type: Dirichlet
    region: left_radius_in
    temperature: 300.0   # (K)

mechanical:
  steel_o:

  - type: Neumann
    region: right_radius_o
    traction: 0.0   # (Pa)

  - type: Neumann
    region: right_radius_in
    traction: -1.0e+6   # (Pa)

  steel_in:

  - type: Clamp_x
    region: left_radius_in
    value: 0.0   # (Pa)

  - type: Neumann
    region: left_radius_in
    traction: -1.0e+6   # (Pa)

