mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  steel_in: ../../../materials/steel_2.yaml
  steel_o: ../../../materials/steel.yaml

regime: 2d  # ou "axisymmetric" si tu préfères

solver_settings:
  coupling: staggered
  max_iters: 100
  relax_u: 0.4
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.7
  relax_min: 0.05
  relax_max: 0.95

models:
  thermal: false  # Désactive le thermique pour simplifier
  mechanical: true
  contact: true   # Active le contact

mechanical:
  solver: nonlinear  # Le contact nécessite un solveur non-linéaire
  linear_solver: direct_mumps
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm

contact:
  penalty: 1e8      # Coefficient de pénalité (Pa/m)
  gap: 0.0          # Jeu initial (m)
  friction: 0.0     # Coefficient de frottement (0 = sans frottement)

lhr:
  - 0.0
time:
  - 0.0
n_steps: 1

output:
  format: vtu
