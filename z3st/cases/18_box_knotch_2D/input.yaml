mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  steel: ../../materials/high_carbon_steel.yaml

regime: 2D

solver_settings:
  coupling: staggered
  max_iters: 100
  relax_T: 0.9
  relax_u: 0.8
  relax_D: 0.6

models:
  thermal: false
  mechanical: true
  damage: true

mechanical:
  solver: non-linear # linear | non-linear
  linear_solver: iterative_hypre # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm

thermal:
  solver: linear # linear | non-linear
  linear_solver: iterative_hypre # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm

damage:
  type: AT2
  solver: linear
  linear_solver: iterative_hypre # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-4
  convergence: rel_norm # rel_norm | norm
  lc: 0.002

lhr: 
- 0.0
time: 
- 0.0
n_steps: 1
