thermal:
  steel:
  - type: Dirichlet
    region: inner_radius
    temperature: 500.0   # (K)

  - type: Dirichlet
    region: outer_radius
    temperature: 400.0   # (K)

mechanical:
  steel:
  - type: Clamp_y
    region: bottom

  - type: Neumann
    region: inner_radius
    traction: 0.0   # (Pa)

  - type: Neumann
    region: outer_radius
    traction: 0.0   # (Pa)
