mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  volume: ../../../../materials/ceramic.yaml

regime: axisymmetric

solver_settings:
  coupling: staggered
  max_iters: 100
  relax_T: 0.9
  relax_u: 0.4
  relax_adaptive: true
  relax_growth: 1.10
  relax_shrink: 0.90
  relax_min: 0.05
  relax_max: 0.95

models:
  thermal: true
  mechanical: true

mechanical:
  solver: linear
  linear_solver: direct_mumps # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm

thermal:
  solver: linear
  linear_solver: direct_mumps # direct_mumps | iterative_amg | iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm # rel_norm | norm

lhr:
- 500.0
time:
- 0.0
n_steps: 1
