mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  fuel: fuel.yaml

regime: 2d

solver_settings:
  coupling: staggered
  max_iters: 30
  relax_T: 0.8
  relax_adaptive: false

models:
  thermal: true
  porosity: true

output:
  format: xdmf

thermal:
  analysis: transient
  solver: linear
  linear_solver: direct_mumps
  rtol: 1.0e-8
  stag_tol: 1.0e-7
  convergence: rel_norm

porosity:
  linear_solver: direct_mumps
  rtol: 1.0e-8
  stag_tol_rel: 1.0e-6
  stag_tol_abs: 1.0e-8
  stabilisation: supg
  # relax: 0.8
  aitken: true
  aitken_omega0: 0.5

lhr:
- 0.0
- 312.5
- 625.0
- 937.5
- 1250.0
- 1562.5
- 1875.0
- 2187.5
- 2500.0
- 2812.5
- 3125.0

time:
- 0.0
- 1000.0
- 2000.0
- 3000.0
- 4000.0
- 5000.0
- 6000.0
- 7000.0
- 8000.0
- 9000.0
- 10000.0

n_steps: 200
