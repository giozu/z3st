thermal:
  fuel:
  - type: Dirichlet
    region: outer
    temperature: 600.0   # (K)
  - type: Neumann
    region: bottom
    flux: 0.0
  - type: Neumann
    region: top
    flux: 0.0
  - type: Neumann
    region: inner
