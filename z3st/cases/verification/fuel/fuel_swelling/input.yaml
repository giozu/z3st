mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  fuel: fuel.yaml

regime: 3D

solver_settings:
  coupling: staggered
  max_iters: 20
  relax_T: 1.0
  relax_u: 1.0
  relax_adaptive: false

models:
  thermal: true
  mechanical: true

thermal:
  solver: linear
  linear_solver: direct_mumps
  rtol: 1.0e-8
  stag_tol: 1.0e-7
  convergence: rel_norm

mechanical:
  solver: linear
  linear_solver: direct_mumps
  rtol: 1.0e-9
  stag_tol: 1.0e-8
  convergence: rel_norm

lhr:
- 20000.0
- 20000.0
time:
- 0.0
- 1.0e+7
n_steps: 5
