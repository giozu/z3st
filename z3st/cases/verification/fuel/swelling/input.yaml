mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  steel: swell.yaml

regime: 3D

solver_settings:
  coupling: staggered
  max_iters: 10
  relax_u: 1.0
  relax_adaptive: false

models:
  mechanical: true

mechanical:
  solver: linear
  linear_solver: direct_mumps
  rtol: 1.0e-9
  stag_tol: 1.0e-8
  convergence: rel_norm

lhr:
- 0.0
time:
- 0.0
n_steps: 1
