name: fuel-axial-table-test
# Fissile fuel verifying the tabulated axial power source bus. A piecewise-linear
# table f(z_i) of node-wise peaking factors shapes the deposited power. set_power
# normalises the form factor to mean 1, so only the table shape matters.
fissile: true

# Tabulated axial form factor: resolved by spine.load_materials, applied in
# set_power via piecewise-linear interpolation (materials.fuel_profiles).
axial_profile: materials.fuel_profiles.tabulated_axial
axial_table_z: [0.0, 0.1, 0.2, 0.3, 0.4]    # (m) elevations
axial_table_f: [0.4, 1.0, 1.3, 1.0, 0.4]    # (-) relative power

E: 358.0e9                      # (Pa) (only the thermal-stress output field needs these;
nu: 0.23                        # (-)  mechanical is off)

k: 5.0                          # (W/(m·K)) thermal conductivity
cp: 280.0                       # (J/(kg·K)) specific heat
rho: 10970.0                    # (kg/m³) density
heavy_metal_fraction: 0.8815    # (-) M_U / M_UO2; burnup is per kg heavy metal

alpha: 1.0e-5                   # (1/K) thermal expansion
T_ref: 300.0                    # (K)
T_initial: 300.0                # (K)

mu_gamma: 0.0
gamma_heating: 0.0
