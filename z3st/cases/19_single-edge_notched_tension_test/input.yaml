mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  steel: ../../materials/high_carbon_steel.yaml

regime: 2d

solver_settings:
  coupling: staggered
  max_iters: 200
  relax_u: 1.0
  relax_D: 0.8
  relax_adaptive: false

models:
  thermal: false
  mechanical: true
  damage: true

mechanical:
  solver: linear
  linear_solver: direct_mumps
  rtol: 1.0e-5
  stag_tol: 1.0e-5
  convergence: rel_norm

damage:
  type: AT2
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-5
  stag_tol: 1.0e-5
  convergence: rel_norm
  lc: 4.0e-6

lhr:
- 0.0
- 0.0
time:
- 0.0
- 3600.0
n_steps: 701
