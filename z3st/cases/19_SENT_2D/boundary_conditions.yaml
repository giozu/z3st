# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---
#
# Boundary conditions for case 19_SENT_2D.
#
# Mechanical: bottom edge clamped, top edge displaced upward in 200
# steps of 0.04 um (from 0.04 um at step 0 to 8.0 um at step 199). The
# first ~170 steps cover the linear-elastic regime; the AT2 threshold
# (sigma_c = 3.87 GPa at our ell_c = 4 um) is crossed at the notch tip
# around step ~175 (u_y ~ 7.0 um); the brittle drop falls in the last
# ~25 steps.
#
# Note: Ambati's Fig. 6 reports the peak at u_y ~ 5.5 um with their
# ell_c = 7.5 um. The shift to ~7.0 um here is the analytical scaling
# u_peak ~ ell_c^(-1/4) of the AT2 threshold. Switch ell_c in input.yaml
# back to 7.5 um and shrink u_y_max to ~6 um to overlay Ambati literally.
#
# Damage: Dirichlet D = 1 along the "crack" curve (the notch slit)
# gives the staggered scheme a well-posed problem from step 0 and
# anchors the crack to the notch tip -- the standard pre-crack scheme
# used in the phase-field SENT literature (cf. case
# 14_full_cylinder_cracking_2D_xy for the same pattern in a
# thermo-mechanical context).
#
# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---

