# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---
# Z3ST: An open-source FEniCSx framework for thermo-mechanical analysis
# Author: Giovanni Zullo
# Version: 0.1.0 (2025)
# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---
#
# Case: 19_SENT_2D
# Geometry: 1 mm x 1 mm square plate with a horizontal notch of length
# 0.5 mm running from the left edge to the centre. True 2D mesh (no z).
# Reproduces the Ambati et al. 2015 (Comput Mech 55:383-405) SENT
# tension benchmark (their §4.1, Fig. 5-7) using the AT2 + hybrid
# phase-field formulation (their Eq. 27).
# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---

mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  steel: ../../materials/high_carbon_steel.yaml

regime: 2d                      # plane strain (3x3 strain tensor with zero z-components)

solver_settings:
  coupling: staggered
  max_iters: 200
  relax_T: 0.9                  # unused (thermal off) but kept for completeness
  relax_u: 1.0
  relax_D: 0.8
  relax_adaptive: false
  relax_growth: 1.2
  relax_shrink: 0.8
  relax_min: 0.05
  relax_max: 0.95

models:
  thermal: false
  mechanical: true
  damage: true

mechanical:
  solver: linear
  linear_solver: direct_mumps   # Once cracks open, g(D) -> K ~ 1e-6 in cracked
                                # cells gives the operator 6-7 orders of magnitude
                                # heterogeneity; BoomerAMG terminates on garbage
                                # residuals on that kind of SPD. MUMPS is robust
                                # and fast at this 2D system size (~10k DOFs).
  rtol: 1.0e-5
  stag_tol: 1.0e-5
  convergence: rel_norm

damage:
  type: AT2                     # Ambati hybrid formulation (Comput Mech 55:383-405,
                                # Eq. 27): linear mechanical block, AT2 crack-density
                                # functional, Amor split with hybrid constraint
                                # (H = 0 in cells where psi- > psi+).
  solver: linear
  linear_solver: iterative_hypre  # AT2 mass coefficient is (H + 1), much milder
                                  # heterogeneity than AT1's 2H -- BoomerAMG is fine.
  rtol: 1.0e-5
  stag_tol: 1.0e-5
  convergence: rel_norm
  lc: 4.0e-6                    # 4 um -- Ambati uses 7.5 um in their plots; this is
                                # finer, gives a sharper localised crack band.
                                # AT2 analytical peak: sigma_c = sqrt(27 Gc E / (256 lc))
                                # = sqrt(27 * 2700 * 2.1e11 / (256 * 4e-6)) ~= 3.87 GPa.

# Loading: quasi-static displacement-controlled tension on the top edge,
# bottom edge clamped. The displacement ramps from 0.04 um to 8.0 um in
# 200 steps of 0.04 um, covering the full Ambati Fig. 6 response: linear
# elastic up to the AT2 threshold, peak, and brittle drop.
#
# Note on the peak location: Ambati's Fig. 6 plots the peak at u_y ~ 5.5
# um with their ell_c = 7.5 um. Our finer ell_c = 4 um raises the AT2
# threshold sigma_c from 2.82 GPa to 3.87 GPa, which shifts the peak to
# u_y ~ 7.0 um (peak scales as ~ ell_c^(-1/4)). The qualitative response
# is identical; switch ell_c to 7.5 um to overlay Ambati's curve literally.
time:
  - 0.0
  - 3600.0                      # 1 hr nominal (quasi-static; phase-field is rate-
                                # independent, the time axis is just a step counter).
lhr:
  - 0.0
  - 0.0
n_steps: 200

output:
  format: vtu
  filename: fields
