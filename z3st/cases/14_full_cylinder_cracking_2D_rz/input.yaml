mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  uo2: ../../materials/uo2.yaml

regime: axisymmetric

solver_settings:
  coupling: staggered
  max_iters: 200
  relax_T: 0.8
  relax_u: 0.6
  relax_D: 0.5
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.95     # gentler than 0.9 to avoid the controller collapsing in a few oscillations
  relax_min: 0.05        # symmetric with the 3D variant
  relax_max: 0.95

models:
  thermal: true
  mechanical: true
  damage: true

mechanical:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm

thermal:
  analysis: transient
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-6
  convergence: rel_norm

damage:
  type: AT2
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-3
  convergence: rel_norm
  lc: 5.0e-5            # (m) = 50 um; coarsened from McClenny's 1 um, h ~ lc/2 with lc_outer = 10 um
  hybrid_constraint: true

time:
  - 0.0
  - 0.01

lhr:
  - 0.0
  - 0.0

n_steps: 20

output:
  format: xdmf
  filename: simulation.xdmf
