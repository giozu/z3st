mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  uo2: uo2_fuel.yaml

regime: 3d

solver_settings:
  coupling: staggered
  max_iters: 100
  relax_T: 0.8
  relax_u: 1.0

models:
  thermal: true
  mechanical: true

mechanical:
  solver: linear
  linear_solver: iterative_amg
  remove_rigid_nullspace: true
  rtol: 1.0e-8
  stag_tol: 1.0e-6
  convergence: rel_norm

thermal:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-8
  stag_tol: 1.0e-6
  convergence: rel_norm

lhr:
- 25000.0   # (W/m)
time:
- 0.0
n_steps: 1


output:
  format: xdmf
  filename: fields
