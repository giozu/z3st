mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  cyl_1: fuel.yaml
  cyl_2: clad.yaml

regime: axisymmetric

solver_settings:
  coupling: staggered
  max_iters: 300
  relax_T: 1.0
  relax_u: 0.3
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.6
  relax_min: 0.03
  relax_max: 0.9

models:
  thermal: true
  mechanical: true
  contact:
    surface_a: lateral_1
    surface_b: inner_2
    penalty_stiffness: 1.0e14
    initial_gap: 30.0e-6

mechanical:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-5
  convergence: rel_norm

thermal:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-7
  stag_tol: 1.0e-6
  convergence: rel_norm
  analysis: stationary

lhr:
- 0.0
- 0.0
time:
- 0.0
- 1.0
n_steps: 13
