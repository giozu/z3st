# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---
# Z3ST: An open-source FEniCSx framework for thermo-mechanical analysis
# Author: Giovanni Zullo
# --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. --- --.. ..- .-.. .-.. ---
#
# VERIFICATION that the eigenstrain bus consumes the burnup state bus. A fissile
# block accumulates a uniform burnup (flat power profile) over a fixed time; its
# swelling eigenstrain ΔV/V = swelling_rate * bu then drives a free, stress-free
# expansion. With alpha absent (no thermal strain) the closed form is
#
#     bu      = q''' * t / (rho * HM * 8.64e10)        [MWd/kgU]
#     ΔV/V    = swelling_rate * bu
#     u_x(Lx) = (ΔV/V)/3 * Lx     and     sigma ≈ 0
#
# q''' = lhr / area, area = Lx*Ly. Thermal + mechanical.

mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  fuel: fuel.yaml

regime: 3D

solver_settings:
  coupling: staggered
  max_iters: 20
  relax_T: 1.0
  relax_u: 1.0
  relax_adaptive: false

models:
  thermal: true
  mechanical: true

thermal:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-8
  stag_tol: 1.0e-7
  convergence: rel_norm

mechanical:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-9
  stag_tol: 1.0e-8
  convergence: rel_norm

# Constant 20 kW/m over 1e7 s (~116 days); the total burnup is independent of
# the step subdivision.
lhr:
- 20000.0
- 20000.0
time:
- 0.0
- 1.0e+7
n_steps: 5
