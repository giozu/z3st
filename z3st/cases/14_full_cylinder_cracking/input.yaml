mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  uo2: ../../materials/uo2.yaml

regime: 3d

solver_settings:
  coupling: staggered
  max_iters: 200
  relax_T: 0.8
  relax_u: 0.7
  relax_D: 0.5
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.9
  relax_min: 0.3
  relax_max: 0.95

models:
  thermal: true
  mechanical: true
  damage: true

mechanical:
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-3
  convergence: rel_norm

thermal:
  analysis: transient
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-3
  convergence: rel_norm

damage:
  type: AT1
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-3
  convergence: rel_norm
  lc: 1.0e-4
  hybrid_constraint: true

time:
  - 0.0
  - 1.0

lhr:
  - 0.0
  - 0.0

n_steps: 30

output:
  format: xdmf
  filename: simulation.xdmf
