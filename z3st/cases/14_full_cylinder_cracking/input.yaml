mesh_path: mesh.msh
geometry_path: geometry.yaml
boundary_conditions_path: boundary_conditions.yaml

materials:
  uo2: ../../materials/uo2.yaml

regime: 3d

solver_settings:
  coupling: staggered
  max_iters: 300          # raised from 200 to give the staggered loop more headroom near crack onset
  relax_T: 0.8
  relax_u: 0.7
  relax_D: 0.3            # lowered from 0.5; damage block is the staggered bottleneck during crack growth
  relax_adaptive: true
  relax_growth: 1.1
  relax_shrink: 0.95      # gentler than 0.9 to avoid the controller collapsing in a few oscillations
  relax_min: 0.05         # lowered from 0.3 so the controller can find an equilibrium below the previous floor
  relax_max: 0.95

models:
  thermal: true
  mechanical: true
  damage: true

mechanical:
  solver: linear
  linear_solver: direct_mumps   # MUMPS handles the near-singular Jacobian in cracked cells
                                # (g(D) ~ K = 1e-6) via partial pivoting. The 2D-xy variant
                                # diverged with iterative_hypre at step ~22; MUMPS is the fix.
                                # Memory footprint is heavier but tractable for this 3D mesh size.
                                # If MUMPS runs out of memory, fall back to iterative_amg with
                                # a tighter rtol (~1.0e-8).
  rtol: 1.0e-6
  stag_tol: 1.0e-3
  convergence: rel_norm

thermal:
  analysis: transient
  solver: linear
  linear_solver: iterative_hypre
  rtol: 1.0e-6
  stag_tol: 1.0e-3
  convergence: rel_norm

damage:
  type: AT1                # AT1 has finite elastic threshold; suppresses AT2 smearing at coarsened lc
  solver: linear
  linear_solver: direct_mumps   # Same rationale as the 2D-xy variant: the AT1 mass term
                                # 2*H = 2*psi+ varies by 7+ orders of magnitude between rim
                                # and bulk, and BoomerAMG returns garbage residuals there.
                                # If MUMPS hits memory limits in 3D, the next-best fallback
                                # is iterative_amg (GAMG) with rtol=1.0e-8 and tighter stag_tol.
  rtol: 1.0e-6
  stag_tol: 1.0e-3
  convergence: rel_norm
  lc: 5.0e-5            # (m) = 50 um; coarsened from McClenny's 1 um to remain tractable in 3D, h ~ lc/2 with lc_outer = 25 um
  hybrid_constraint: true

time:
  - 0.0001                # was 0.0; non-zero start avoids the dt=0 static-IC step that produced a
                          # discontinuous T field at the boundary and spurious bulk stresses
  - 0.1                   # focused on the cracking transient (cracks appear at t ~ 1e-2 s per McClenny Fig. 7)

lhr:
  - 0.0
  - 0.0

n_steps: 50               # dt = 2 ms; full window covers nucleation + early propagation

output:
  format: vtu             # non-regression.py reads fields_*.vtu
  filename: fields